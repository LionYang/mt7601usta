# 目标参考：海思 hi3798mv100 类机顶盒
#   uname: Linux 4.4.35, armv7l, ARM Cortex-A7, little endian
#  工具链：arm-linux-gnueabihf（硬浮点，与常见 armv7l 根文件系统一致）
#  如 insmod 报 vermagic 不符：本机构 config 与厂商树仍可能不同，需要对方内核源码/配置
#  或设备上 /boot 同版本 config、Module.symvers 后再编。

name: Build MT7601U Driver (Blind Config)

on:
  push: {}
  workflow_dispatch:

jobs:
  build:
    # ubuntu-20.04 托管镜像已退役，会一直排队；用 22.04/24.04
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Driver Source
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc-arm-linux-gnueabihf make bc bison flex libssl-dev wget kmod

    - name: Setup Kernel Source
      run: |
        set -e
        echo "👇 下载与设备同主版本的 Linux 4.4.35 上游源码..."
        wget -q https://cdn.kernel.org/pub/linux/kernel/v4.x/linux-4.4.35.tar.xz
        tar -xf linux-4.4.35.tar.xz
        mv linux-4.4.35 kernel-source

        echo "👇 ARMv7 多平台 defconfig（Cortex-A7 / 与 armv7l SMP 线一致），不做 LOCALVERSION 后缀"
        # GCC 10+ 默认 -fno-common，老 4.4 编 scripts/dtc 时 lex/bison 会报 yylloc 多重定义，需 -fcommon
        cd kernel-source
        _hcf='HOSTCFLAGS=-O2 -fcommon' ; _hcxx='HOSTCXXFLAGS=-O2 -fcommon'
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- "$_hcf" "$_hcxx" multi_v7_defconfig
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- "$_hcf" "$_hcxx" olddefconfig

        echo "👇 期望的内核 version 字符串: $(make -s ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- kernelrelease)"
        echo "👇 准备编译外置模块头/脚本..."
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- "$_hcf" "$_hcxx" prepare
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- "$_hcf" "$_hcxx" modules_prepare

    - name: Build Module
      env:
        ARCH: arm
        CROSS_COMPILE: arm-linux-gnueabihf-
      run: |
        # 本仓库为 mediatek 官方 STA 树（src/Makefile），非 kuba-moo 的 in-tree mt7601u.ko
        echo "🔨 在 src/ 中交叉编译（KDIR=kernel-source，产 mt7601Usta.ko）"
        cd src
        make all TARGET=LINUX CHIPSET=7601U "LINUX_SRC=${GITHUB_WORKSPACE}/kernel-source" "CROSS_COMPILE=arm-linux-gnueabihf-"
        echo "✅ 编译完成："
        ls -lh "os/linux/mt7601Usta.ko"
        modinfo "os/linux/mt7601Usta.ko"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mt7601u-driver
        path: src/os/linux/mt7601Usta.ko